<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Kyro constellation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E2350"/>
      <stop offset="1" stop-color="#1C4A97"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#bg)"/>

  <g transform="translate(-2,8)">
    <!-- lines -->
    <g stroke="#CFE4FF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" fill="none">
      <path d="M60 31 L63 44 L54 56 L36 58 L24 66"/>
      <path d="M54 56 L50 78"/>
      <path d="M36 58 L32 78"/>
      <path d="M63 44 L90 44"/>
      <path d="M90 30 L72 44 L90 58"/>
      <path d="M72 44 L104 44"/>
    </g>
    <path d="M90 30 Q100 44 90 58" fill="none" stroke="#CFE4FF" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
    <polygon points="103,41 110,44 103,47" fill="#FFFFFF"/>

    <!-- stars -->
    <g fill="#FFFFFF">
      <circle cx="63" cy="44" r="2.6"/>
      <circle cx="54" cy="56" r="2.4"/>
      <circle cx="36" cy="58" r="2.4"/>
      <circle cx="24" cy="66" r="2.1"/>
      <circle cx="50" cy="78" r="2.2"/>
      <circle cx="32" cy="78" r="2.2"/>
      <circle cx="72" cy="44" r="2.4"/>
      <circle cx="90" cy="30" r="2.3"/>
      <circle cx="90" cy="58" r="2.3"/>
    </g>

    <!-- guiding star -->
    <circle cx="60" cy="31" r="11" fill="url(#halo)"/>
    <path d="M60 22 L62.4 28.6 L69 31 L62.4 33.4 L60 40 L57.6 33.4 L51 31 L57.6 28.6 Z" fill="#FFFFFF"/>
