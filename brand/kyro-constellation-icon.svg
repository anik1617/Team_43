<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Kyro Sagittarius constellation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E2350"/>
      <stop offset="1" stop-color="#1C4A97"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#bg)"/>

  <g transform="translate(-3,7)">
    <!-- constellation lines -->
    <g stroke="#BFD8FF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" fill="none">
      <!-- head to shoulder, torso, back, croup, tail -->
      <path d="M58 30 L60 44 L52 54 L40 56 L30 58 L22 64"/>
      <!-- legs -->
      <path d="M52 54 L50 76"/>
      <path d="M40 56 L34 76"/>
      <!-- lead arm to bow grip, draw arm -->
      <path d="M60 44 L88 44"/>
      <!-- bowstring -->
      <path d="M88 30 L70 44 L88 58"/>
      <!-- arrow -->
      <path d="M70 44 L104 44"/>
    </g>

    <!-- bow arc -->
    <path d="M88 30 Q98 44 88 58" fill="none" stroke="#BFD8FF" stroke-width="1.7" stroke-linecap="round" opacity="0.7"/>
    <!-- arrowhead -->
    <polygon points="103,41 110,44 103,47" fill="#FFFFFF"/>

    <!-- minor stars -->
    <g fill="#FFFFFF">
      <circle cx="60" cy="44" r="2.3"/>
      <circle cx="52" cy="54" r="2.1"/>
      <circle cx="40" cy="56" r="2.3"/>
      <circle cx="30" cy="58" r="2.0"/>
      <circle cx="22" cy="64" r="1.9"/>
      <circle cx="50" cy="76" r="2.0"/>
      <circle cx="34" cy="76" r="2.0"/>
      <circle cx="70" cy="44" r="2.2"/>
      <circle cx="88" cy="30" r="2.1"/>
      <circle cx="88" cy="58" r="2.1"/>
    </g>

    <!-- bright accent star (the bow grip) -->
    <path d="M88 38 L89.6 42.4 L94 44 L89.6 45.6 L88 50 L86.4 45.6 L82 44 L86.4 42.4 Z" fill="#FFFFFF"/>

    <!-- THE GUIDING STAR (the head / Kaus) -->
    <circle cx="58" cy="30" r="13" fill="url(#halo)"/>
    <path d="M58 18 L60.8 26.2 L69 29 L60.8 31.8 L58 40 L55.2 31.8 L47 29 L55.2 26.2 Z" fill="#FFFFFF"/>
  </g>
</svg>
