<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Kyro constellation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F45"/>
      <stop offset="1" stop-color="#1E4FA0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- faint background starfield -->
  <g fill="#CFE4FF">
    <circle cx="22" cy="26" r="1" opacity="0.5"/>
    <circle cx="98" cy="22" r="1.3" opacity="0.55"/>
    <circle cx="103" cy="92" r="1" opacity="0.45"/>
    <circle cx="30" cy="98" r="1.2" opacity="0.5"/>
    <circle cx="14" cy="76" r="0.9" opacity="0.4"/>
    <circle cx="88" cy="104" r="0.9" opacity="0.4"/>
  </g>

  <g transform="translate(-4,9)">
    <!-- constellation lines -->
    <g stroke="#CFE4FF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" fill="none">
      <path d="M60 30 L64 43 L58 54"/>
      <path d="M58 54 L48 55 L38 56 L29 58 L21 65"/>
      <path d="M50 55 L53 77"/>
      <path d="M38 56 L33 77"/>
      <path d="M64 43 L72 43"/>
      <path d="M64 43 L90 43"/>
      <path d="M90 28 L72 43 L90 58"/>
      <path d="M72 43 L104 43"/>
    </g>
    <path d="M90 28 Q101 43 90 58" fill="none" stroke="#CFE4FF" stroke-width="1.6" stroke-linecap="round" opacity="0.65"/>
    <polygon points="103,40 110,43 103,46" fill="#FFFFFF"/>

    <!-- stars -->
    <g fill="#FFFFFF">
      <circle cx="64" cy="43" r="2.6"/>
      <circle cx="58" cy="54" r="2.4"/>
      <circle cx="48" cy="55" r="2.2"/>
      <circle cx="38" cy="56" r="2.4"/>
      <circle cx="29" cy="58" r="2.2"/>
      <circle cx="21" cy="65" r="2"/>
      <circle cx="53" cy="77" r="2.2"/>
      <circle cx="33" cy="77" r="2.2"/>
      <circle cx="72" cy="43" r="2.4"/>
      <circle cx="90" cy="28" r="2.2"/>
      <circle cx="90" cy="58" r="2.2"/>
      <circle cx="90" cy="43" r="2.2"/>
    </g>

    <!-- the guiding star (the head = the guide) -->
    <circle cx="60" cy="30" r="11" fill="url(#halo)"/>
    <path d="M60 21 L62.4 27.6 L69 30 L62.4 32.4 L60 39 L57.6 32.4 L51 30 L57.6 27.6 Z" fill="#FFFFFF"/>
  </g>
</svg>
