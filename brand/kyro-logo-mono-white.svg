<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 150" width="660" height="150" role="img" aria-label="Kyro logo">
  <defs>
    <mask id="braid">
      <rect x="0" y="0" width="120" height="120" fill="white"/>
      <rect x="53" y="46" width="14" height="11" rx="3" fill="black"/>
      <rect x="53" y="80" width="14" height="11" rx="3" fill="black"/>
    </mask>
  </defs>

  <!-- MARK -->
  <g transform="translate(15,15)" fill="#FFFFFF" stroke="#FFFFFF">
    <circle cx="60" cy="22" r="6.5" stroke="none"/>
    <line x1="60" y1="30" x2="60" y2="104" stroke-width="5" stroke-linecap="round"/>
    <path d="M60 33 C78 38 78 46 60 51 C42 56 42 63 60 68 C78 73 78 80 60 85 C42 90 42 98 60 103"
