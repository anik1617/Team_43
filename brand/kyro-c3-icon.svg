<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Kyro centaur">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#2E9BE0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- slender legs with subtle gait -->
  <g fill="none" stroke="#FFFFFF" stroke-width="4.6" stroke-linecap="round">
    <path d="M34 65 L31 91"/>
    <path d="M44 67 L46 91"/>
    <path d="M57 67 L54 91"/>
    <path d="M65 65 L70 90"/>
  </g>
  <g fill="#FFFFFF">
    <ellipse cx="31" cy="92" rx="3.4" ry="1.9"/>
    <ellipse cx="46" cy="92" rx="3.4" ry="1.9"/>
    <ellipse cx="54" cy="92" rx="3.4" ry="1.9"/>
    <ellipse cx="70" cy="91" rx="3.4" ry="1.9"/>
  </g>

  <g fill="#FFFFFF">
    <!-- flowing tail -->
    <path d="M24 56 C12 55 7 69 11 87 C13 79 17 67 24 63 C27 61 28 58 28 57 Z"/>
    <!-- long graceful body with arched back into the neck -->
    <path d="M23 56 C30 49 41 52 49 53 C55 54 58 49 63 49
             C70 49 73 56 70 63 C61 69 41 69 33 68
             C26 67 19 62 23 56 Z"/>
    <!-- human torso, natural lean -->
    <path d="M60 57 C55 49 56 38 61 32 C63 29 69 30 71 35
             C72 44 69 51 66 58 Z"/>
    <!-- head -->
    <circle cx="66" cy="23" r="6"/>
    <path d="M62.5 27 L68 27 L67 33 L63.5 33 Z"/>
  </g>

  <!-- arms + drawn bow -->
  <g fill="none" stroke="#FFFFFF" stroke-width="3.8" stroke-linecap="round">
    <path d="M68 33 C79 31 89 32 96 35"/>
    <path d="M62 35 C65 36 64 37 66 37"/>
  </g>
  <path d="M97 17 Q109 35 97 53" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M97 17 L66 37 L97 53" fill="none" stroke="#FFFFFF" stroke-width="1.6"/>
  <line x1="62" y1="36" x2="105" y2="34" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
  <polygon points="104,30 112,34 104,38" fill="#FFFFFF"/>
</svg>
