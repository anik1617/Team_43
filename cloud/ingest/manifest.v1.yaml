    fetch_risk: low
    notes: "Airway/induction when the GMO intubates without a neuro-anaesthetist. © but free-to-read — paraphrase + cite."

  # --- bucket 5: in-repo primary + recognition/mechanism (no download) ---
  - id: nawaz_peshawar_lecture
    title: "Dr. Nawaz — Managing TBI in the Resource-Limited Setting (Peshawar lecture)"
