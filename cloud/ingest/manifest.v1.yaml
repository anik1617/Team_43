  - id: zarmer_2025
    title: "Zarmer 2025 — Advances in TBI Diagnosis and Treatment"
    citation: "Zarmer et al., Advances in TBI Diagnosis and Treatment, 2025"
    tier: 1
    license: green
    priority: 1
    acquire: in_repo
    src: "TBI Resources/Zarmer 2025 - Advances in TBI Diagnosis and Treatment.pdf"
    bucket: "5-in-repo-primary"
    notes: "Diagnose-without-CT (GFAP/UCH-L1 biomarkers) — supports the recognition/triage nodes."

