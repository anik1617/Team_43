# win). They NEVER override Tier-0 guidelines on the critical path.
# CAVEAT (recorded honestly): a SHIPPING product needs licensed/open content — the expert-
# contributor network is how the real product sources proprietary procedural knowledge.
# BLOCKER: these are paywalled; cloud stream cannot legitimately download them. Aniket must
# drop the PDFs in cloud/ingest/textbooks/ (gitignored, NEVER committed) and they get folded
# into graphrag/input/ on the next corpus pass. license=red kept as an honest flag, not a gate.
# -------------------------------------------------------------------------------------
v1_demo_only:
