    tier: 0
    license: green
    priority: 1
    acquire: fetch_html
    src: "https://resources.wfsahq.org/atotw/management-of-the-head-injured-patient/"
    bucket: "3-stabilize-principles"
    fetch_risk: low
    notes: "Non-specialist head-injury mgmt; explicitly CC-licensed (cleanest license in the set)."

  - id: btf_guidelines_4th_ed
    title: "BTF — Guidelines for the Management of Severe TBI, 4th ed."
    citation: "Carney et al., BTF Guidelines for Management of Severe TBI, 4th ed., Neurosurgery 2017"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_pdf
    src: "https://globalneuro.org/uploads/files/Guidelines_for_Management_of_Severe_TBI_4th_Edition.pdf"
    bucket: "3-stabilize-principles"
    fetch_risk: med
    notes: "ALREADY a stem in sources.py. ICP/CPP thresholds, BP targets. Large — chunk to thresholds/recommendations."

  # --- bucket 4: perioperative flags (the post-op / adjunct nodes) ---
  - id: seizure_prophylaxis_cpg
    title: "Post-Traumatic Seizure Prophylaxis CPG (levetiracetam, 7-day)"
