# Kyro edh-core-v1 — INGESTION MANIFEST
# =====================================================================================
# PURPOSE: the decision artifact that says, per source, IN-or-OUT of the v1 EDH bundle,
#          how we acquire it, its license/trust tier, and its rendered citation.
#          Building this manifest DOWNLOADS NOTHING. It is the gate before any fetch.
#
# WHY NOT "ingest everything": docs/08-knowledge-sources.md line 129 — the MVP needs a
#          hand-built EDH canonical-core subgraph (~a few dozen vetted chunks / ~160
#          node-classes), NOT the whole catalog. Three classes are deliberately EXCLUDED:
#            1. Copyrighted textbooks/atlases (Youmans/Greenberg/Schmidek/Rhoton) — legal,
#               and an MD judge panel would catch a copyright ingest. Reference, never ingest.
#            2. Credentialed datasets (MIMIC-IV) — that is the harness VALIDATION pipeline,
#               not KB content. Different track, needs CITI/PhysioNet.
#            3. Tier-1 enrichment (operative-video libraries, lecture series) — vision/roadmap.
#
# PIPELINE THIS FEEDS: acquire raw -> clean to one UTF-8 .txt per source named by `id`
#          (the stem) -> drop in cloud/graphrag/input/ -> `graphrag index` ->
#          build_bundle.py (BGE-M3 re-embed + sign) -> bundles/edh-core-v1.kyro.
#          `id` + `citation` + `tier` here are the source of truth that seeds
#          kyro_bundle/sources.py SOURCE_REGISTRY.
#
# FIELD KEYS
#   id        : filename stem == sources.py key == graphrag/input/<id>.txt  (lowercase, _)
#   title     : human title
#   citation  : exact provenance string the app renders behind a recommendation
#   tier      : 0 canonical/guideline-grade (preferred on critical path) | 1 enrichment/expert
#   license   : green  = open / CC / WHO / already-in-repo — safe to distil + cite
#               yellow = free-to-read but ©  — distil-with-citation, prefer paraphrase
#               red    = copyrighted — REFERENCE ONLY, never ingested
#   priority  : 1 = v1 core (must-have)  | 2 = v1 optional depth  | 0 = excluded from v1
#   acquire   : in_repo | fetch_pdf | fetch_html | reference_only | credentialed
#   src       : local path (in_repo) OR url (fetch_*)
#   bucket    : the doc-08 ingestion-priority bucket (lines 128-137)
#   fetch_risk: (fetch_* only) low | med | high — bot-block/paywall likelihood; high => may
#               need a manual download by Aniket, manifest still records the target.
#   notes     : anything reconcile-worthy
# =====================================================================================

meta:
  bundle: edh-core-v1
  scope: "Acute TBI emergency pathway, deepest on EDH. English only."
  target_size: "~15-20 source docs -> a few dozen chunks -> ~160 node-classes"
  built_on: aniket/knowledge-bundle-pipeline
  manifest_version: 1
  excludes_new_transcripts: true   # the 4 surgeon transcripts + Hackathon Mentorship.txt are NOT folded in (Aniket's call)

# -------------------------------------------------------------------------------------
# IN — v1 core. Build the EDH canonical core from these, in doc-08 priority order.
# -------------------------------------------------------------------------------------
v1_core:

