    title: "StatPearls — Epidural Hematoma"
    citation: "StatPearls, Epidural Hematoma (NCBI Bookshelf NBK518982)"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_html
    src: "https://www.ncbi.nlm.nih.gov/books/NBK518982/"
    bucket: "1-edh-spine"
    fetch_risk: low
    notes: "Definitive free concept ref: pathophysiology, lucid interval, CT signs, surgical-vs-conservative."

  - id: emergency_burr_holes_howto
    title: "Emergency Burr Holes: How to do it"
    citation: "Wilson et al., Emergency Burr Holes: How to do it (PMC3352313)"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_pdf
    src: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3352313/"
    bucket: "1-edh-spine"
    fetch_risk: low
    notes: "Step-by-step burr hole written FOR the non-neurosurgeon as a temporizing measure. The procedure-node core."

  - id: bullock_edh_surgical
    title: "Surgical Management of Acute Epidural Hematomas (Bullock)"
    citation: "Bullock et al., Surgical Management of Acute Epidural Hematomas, Neurosurgery 2006"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_pdf
    src: "https://seattleneurosciences.com/wp-content/uploads/2017/10/Surgical-Management-of-Acute-Epidural-Hematomas.pdf"
    bucket: "1-edh-spine"
    fetch_risk: med
    notes: "Primary evidence behind every EDH surgical number Kyro cites (>30 cm3 -> evacuate, etc.)."

  - id: btf_surgical_guidelines
    title: "BTF — Surgical Management of TBI"
    citation: "Brain Trauma Foundation, Surgical Management of TBI"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_html
    src: "https://braintrauma.org/coma/guidelines/surgical"
    bucket: "1-edh-spine"
    fetch_risk: med
    notes: "ALREADY a stem in sources.py. EDH >30 cm3 -> evacuate regardless of GCS; coma+anisocoria -> operate ASAP."

  # --- bucket 2: the no-neurosurgeon decision layer (HM's exact situation) ---
  - id: peshawar_recommendations_2019
    title: "WFNS Peshawar Recommendations 2019"
    citation: "Park & Khan, WFNS Peshawar Recommendations, World Neurosurg 2019"
    tier: 0
    license: green
    priority: 1
    acquire: in_repo
    src: "TBI Resources/Park & Khan 2019 - Peshawar Recommendations Head Spine Injury LMICs.pdf"
    bucket: "2-no-neurosurgeon"
    notes: "ALREADY in sources.py. Home-turf rulebook: endorses SUPERVISED non-specialist EDH evacuation + golden window. NOTE repo has a near-dup 'Park 2019 - ...' — use this Park & Khan file; ignore the dup."

  - id: wses_no_neurosurgical_capability
    title: "WSES — Early mgmt of isolated severe TBI in hospitals WITHOUT neurosurgical capability"
    citation: "Picetti, Servadei, Rubiano et al., WSES consensus, World J Emerg Surg 2023 (PMC9830860)"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_pdf
    src: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9830860/"
    bucket: "2-no-neurosurgeon"
    fetch_risk: low
    notes: "Literally the 'GMO with no neurosurgeon' protocol — single most on-point Tier-0 source after Peshawar."

  # --- bucket 3: the 🟡 stabilize / secondary-injury principles layer ---
  - id: primary_trauma_care_manual
    title: "Primary Trauma Care Course Manual"
    citation: "Primary Trauma Care Foundation, PTC Manual (head-injury chapter)"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_pdf
    src: "https://www.primarytraumacare.org/wp-content/uploads/2011/09/PTC_ENG.pdf"
    bucket: "3-stabilize-principles"
    fetch_risk: low
    notes: "The GMO's bible: ABCs, c-spine, preventing secondary injury — built for district hospitals. Large; chunk the head-injury + shock sections."

  - id: enls_tbi_protocol
    title: "Emergency Neurological Life Support — TBI Protocol"
    citation: "Neurocritical Care Society, ENLS TBI Protocol v4.0"
    tier: 0
    license: green
    priority: 1
    acquire: fetch_pdf
    src: "https://www.neurocriticalcare.org/Portals/0/Docs/ENLS/ENLS_V_4_0_Protocol_TBI_FINAL.pdf"
    bucket: "3-stabilize-principles"
    fetch_risk: med
    notes: "Algorithmic first-hour management; herniation/anisocoria triggers — maps cleanly to 🟡 principle nodes."

  - id: wfsa_head_injury
    title: "WFSA — Management of the Head-Injured Patient"
