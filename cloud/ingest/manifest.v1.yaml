    license: green
    priority: 1
    acquire: fetch_html
    src: "https://med.uth.edu/surgery/post-traumatic-seizure-prophylaxis-in-patients-with-traumatic-brain-injury-clinical-practice-guideline/"
    bucket: "4-perioperative-flags"
    fetch_risk: low
    notes: "Seizure-prophylaxis flag node (HM's 6-month seizure)."

  - id: ketamine_rsi_head_injury
    title: "Ketamine RSI for Head Injury (LITFL)"
