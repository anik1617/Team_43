<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kyro · Contribution Portal</title>
<style>
 :root{--bg:#0f1720;--card:#16212e;--ink:#e8eef5;--mut:#9fb1c4;--acc:#4ea1ff;--ok:#3ec98a;--warn:#f0b440;--bad:#ef6a6a}
 *{box-sizing:border-box} body{margin:0;font:15px/1.55 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
 header{display:flex;gap:16px;align-items:center;padding:13px 20px;background:#0b1219;border-bottom:1px solid #1f2d3d;flex-wrap:wrap}
 header .brand{font-weight:700;color:var(--acc)} header a{color:var(--mut);text-decoration:none;font-size:14px} header a:hover{color:var(--ink)}
 main{max-width:920px;margin:0 auto;padding:20px}
 .card{background:var(--card);border:1px solid #21303f;border-radius:10px;padding:15px 17px;margin:0 0 13px}
 h1{font-size:20px;margin:0 0 6px} h2{font-size:16px;margin:0} .mut{color:var(--mut);font-size:13px}
 .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid #2a3a4d;color:var(--mut);white-space:nowrap}
 .tag.open{color:var(--warn);border-color:#5a4a1f} .tag.addressed,.tag.approved{color:var(--ok);border-color:#1f5a3f} .tag.rejected{color:var(--bad);border-color:#5a2020}
 input,textarea,select{width:100%;background:#0d161f;border:1px solid #27384a;color:var(--ink);border-radius:7px;padding:8px;font:inherit;margin:4px 0}
 textarea{min-height:88px;resize:vertical} label{font-size:13px;color:var(--mut)}
 button{background:var(--acc);color:#03101e;border:0;border-radius:7px;padding:9px 14px;font-weight:600;cursor:pointer;margin-top:6px}
 button.bad{background:var(--bad);color:#1a0606}
 details{margin-top:8px} summary{cursor:pointer;color:var(--acc);font-size:13px}
 .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center} .row>.col{flex:1;min-width:160px}
 code{background:#0a1019;padding:1px 5px;border-radius:4px;color:#9fe0c0;font-size:12px;word-break:break-all}
</style></head>
<body>
<header>
 <span class="brand">⊕ Kyro</span>
 <a href="/portal">Gap inbox</a><a href="/portal/curate">Curate</a><a href="/portal/contributions">Provenance log</a>
 <span style="flex:1"></span><span class="mut">community knowledge flywheel</span>
</header>
<main>{% block body %}{% endblock %}</main>
</body></html>
