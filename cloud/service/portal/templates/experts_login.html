{% extends "base.html" %}
{% block body %}
<div class="eyebrow">Expert network</div>
<h1 class="title">Sign in</h1>
<p class="lede">Manage your availability and contact opt-in.</p>

{% if error %}
<div class="note" style="margin-top:18px;border-color:var(--bad-line);background:var(--bad-bg-2);color:var(--bad)">{{ error }}</div>
{% endif %}

<div class="card" style="margin-top:22px;max-width:420px;padding:24px">
  {% if google_enabled %}
  <a class="btn btn-ghost" href="/auth/google" style="width:100%;justify-content:center">Continue with Google</a>
  <div style="text-align:center;color:var(--mut-2);font-size:11px;margin:16px 0;font-family:var(--mono)">— or —</div>
  {% endif %}
  <form method="post" action="/experts/login">
    <label class="lbl">Email</label>
    <input class="inp" type="email" name="email" value="{{ form.email or '' }}" required style="margin-bottom:14px">
    <label class="lbl">Password</label>
    <input class="inp" type="password" name="password" required>
    <button class="btn btn-primary" type="submit" style="margin-top:18px;width:100%">Sign in</button>
  </form>
</div>

<p class="lede" style="font-size:13px">No account yet?
  <a href="/experts/register" style="color:var(--acc);font-weight:600">Register as an expert</a></p>
{% endblock %}
