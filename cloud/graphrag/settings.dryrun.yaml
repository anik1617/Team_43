### Kyro edh-core PROVEN config — graphrag 3.1.0. This is the EXACT config that built the v99
### dry-run bundle (419 chunks / 1495 nodes / 2223 edges). It is the one to use for edh-core-v1.
###
### Why this file exists: settings.starter.yaml is an OpenAI/v2-era skeleton; THIS is the working
### 3.1.0 config. Calls Anthropic NATIVELY via litellm — graphrag 3.1's completion factory builds
### "{model_provider}/{model}" => "anthropic/claude-haiku-4-5-20251001", so there is NO gateway and
### NO OpenAI key. The text-embedding model is declared but NEVER invoked, because the `workflows`
### allowlist below OMITS generate_text_embeddings — we re-embed with BGE-M3 in build_bundle.py
### (Approach A: GraphRAG does graph extraction only; its vectors are discarded).
###
### To run (from cloud/, graphrag 3.1.0 installed):
###   1. cp graphrag/settings.dryrun.yaml graphrag/settings.yaml
###   2. graphrag init --root graphrag        # writes prompts/ (keep settings.yaml above; merge if needed)
###   3. export KYRO_LLM_KEY=<your Anthropic key>     # the real key; do NOT commit it
###   4. graphrag index --root graphrag --skip-validation
###        (--skip-validation: 3.1 preflight-validates even the declared-but-unused OpenAI embed model)
###   -> graphrag/output/*.parquet  (then: python -m kyro_bundle.build_bundle --root graphrag --version 1)

completion_models:
  default_completion_model:
    model_provider: anthropic
    model: claude-haiku-4-5-20251001     # Haiku for extraction; swap to a stronger Claude for the real index
    auth_method: api_key
    api_key: ${KYRO_LLM_KEY}             # env var only — the real key lives in graphrag/.env (gitignored)
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:               # declared but NEVER invoked (generate_text_embeddings omitted below)
    model_provider: openai
    model: text-embedding-3-small
    auth_method: api_key
    api_key: ${KYRO_LLM_KEY}
    retry:
      type: exponential_backoff

input:
  type: text

chunking:
  type: tokens
  size: 600          # smaller chunks -> sharper guideline citations (matches our design)
  overlap: 100
  encoding_model: o200k_base

input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output/lancedb        # never written (embeddings skipped); forward slash for Linux pods

### Workflow allowlist — standard pipeline MINUS generate_text_embeddings (skip embeddings) and
### extract_covariates (claims disabled). Produces documents/text_units/entities/relationships/
### communities/community_reports parquet — exactly what graphrag_io.py reads.
workflows:
  - load_input_documents
  - create_base_text_units
  - create_final_documents
  - extract_graph
  - finalize_graph
  - create_communities
  - create_final_text_units
  - create_community_reports

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [condition, sign, symptom, procedure, guideline, assessment, principle, anatomy, medication]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

cluster_graph:
  max_cluster_size: 10

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings (not exercised by `graphrag index`, kept for config completeness)
local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"
