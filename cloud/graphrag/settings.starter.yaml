# GraphRAG settings — Kyro edh-core, approach A (extraction only; we embed in build_bundle.py).
#
# IMPORTANT: GraphRAG's config format shifts between versions. Treat this as a STARTER:
#   1. pip install graphrag
#   2. graphrag init --root cloud/graphrag        # writes the version-correct settings.yaml + prompts/
#   3. merge the overrides below into the generated file (don't blindly overwrite it)
#
# The overrides that matter for us:
#   - completion model = a cloud LLM API (no supercomputer; a ~160-node graph is a small build)
#   - embeddings = cheapest OpenAI-compatible model; ITS VECTORS ARE DISCARDED (we re-embed BGE-M3)
#   - entity_types tuned to clinical content so the graph matches our node taxonomy

models:
  default_chat_model:
    type: openai_chat
    model: ${GRAPHRAG_MODEL}
    api_key: ${GRAPHRAG_API_KEY}
    # api_base: ${GRAPHRAG_API_BASE}        # uncomment for a gateway / Azure / local
    model_supports_json: true
    concurrent_requests: 8

  default_embedding_model:
    type: openai_embedding
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    api_key: ${GRAPHRAG_API_KEY}
    # NOTE: discarded. build_bundle.py re-embeds chunk/node text with BGE-M3 (dim 1024).

input:
  type: file
  file_type: text
  base_dir: "input"

chunks:
  size: 600          # smaller chunks → sharper citations for a guideline corpus
  overlap: 100

extract_graph:
  entity_types: [condition, sign, symptom, procedure, guideline, assessment, principle, anatomy, medication]

# Communities + reports stay ON — we ship community_reports as citeable chunks and the
# membership as node_community (GraphRAG's hierarchical advantage, precomputed for the phone).
community_reports:
  max_length: 1500

snapshots:
  graphml: false
